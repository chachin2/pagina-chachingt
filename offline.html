<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Sin conexión | Servicios Chachin</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
      color: #f1f5f9;
      text-align: center;
    }
    h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 0.95rem; opacity: 0.88; line-height: 1.5; max-width: 32ch; margin-bottom: 20px; }
    a {
      display: inline-block;
      padding: 12px 22px;
      background: #0ea5e9;
      color: #0f172a;
      font-weight: 600;
      text-decoration: none;
      border-radius: 10px;
    }
    a:focus-visible { outline: 2px solid #fff; outline-offset: 3px; }
  </style>
</head>
<body>
  <div>
    <h1>Sin conexión</h1>
    <p>Comprueba tu red e intenta de nuevo. El contenido guardado en caché seguirá disponible cuando vuelvas a estar en línea.</p>
    <a href="/index.html">Volver al inicio</a>
  </div>
</body>
</html>
